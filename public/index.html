<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 인게이지먼트 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,"Segoe UI","Malgun Gothic",sans-serif; background:#0f1117; color:#e6e8ee; padding:28px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color:#8b90a0; font-size:13px; margin-bottom:20px; }
    .bar { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    button { background:#ff0033; color:#fff; border:0; padding:11px 18px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.5; cursor:wait; }
    .status { font-size:13px; color:#8b90a0; }
    h2 { font-size:15px; color:#aab; margin:24px 0 10px; }
    table { width:100%; border-collapse:collapse; background:#171a23; border-radius:12px; overflow:hidden; font-size:13px; }
    th,td { padding:10px 12px; text-align:right; border-bottom:1px solid #242838; white-space:nowrap; }
    th:first-child,td:first-child { text-align:left; }
    th { background:#1e2231; color:#aab; font-size:11px; position:sticky; top:0; }
    tr:last-child td { border-bottom:0; }
    .scroll { max-height:360px; overflow:auto; border-radius:12px; }
    .empty { padding:30px; text-align:center; color:#8b90a0; }
    .note { font-size:12px; color:#6b7080; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⚡ 유튜브 인게이지먼트 대시보드</h1>
    <div class="sub">동기화를 누르면 유튜브에서 숫자를 가져와 구글 시트에 기록하고, 아래에 보여줍니다.</div>

    <div class="bar">
      <button id="syncBtn" onclick="sync()">🔄 동기화</button>
      <span class="status" id="status">-</span>
    </div>

    <h2>📅 채널 일별</h2>
    <div class="scroll">
      <table>
        <thead><tr>
          <th>날짜</th><th>구독자증감</th><th>추가영상</th><th>좋아요</th><th>댓글</th>
          <th>공유</th><th>조회수</th><th>평균조회율</th><th>평균시청시간</th>
        </tr></thead>
        <tbody id="dailyRows"><tr><td colspan="9" class="empty">동기화를 눌러주세요.</td></tr></tbody>
      </table>
    </div>
    <div class="note">※ 노출수·노출클릭률(CTR)은 유튜브 스튜디오 전용이라 자동 수집되지 않습니다(수동 입력).</div>

    <h2>🎬 영상별</h2>
    <div class="scroll">
      <table>
        <thead><tr>
          <th>업로드일</th><th>타이틀</th><th>길이</th><th>평균조회율</th><th>조회수</th>
          <th>좋아요</th><th>댓글</th><th>공유</th><th>구독전환</th>
        </tr></thead>
        <tbody id="videoRows"><tr><td colspan="9" class="empty">동기화를 눌러주세요.</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const num = (n) => { const x = Number(String(n).replace(/[^0-9.-]/g,"")); return isNaN(x)? (n??"-") : x.toLocaleString("ko-KR"); };
    const pct = (n) => { const x = Number(String(n).replace(/[^0-9.]/g,"")); if(isNaN(x)) return n??"-"; return (x<=1? (x*100).toFixed(1): x.toFixed(1))+"%"; };

    function renderDaily(rows) {
      const el = document.getElementById("dailyRows");
      // 최신이 아래쪽이므로 역순 표시
      const r = [...rows].reverse().filter(x=>x[0]);
      if (!r.length) { el.innerHTML='<tr><td colspan="9" class="empty">데이터 없음</td></tr>'; return; }
      // 컬럼: 0날짜 1구독자 2추가영상 3좋아요 4댓글 5공유 6조회수 7노출수 8CTR 9평균조회율 10시청지속률 11평균시청시간
      el.innerHTML = r.map(x=>`<tr>
        <td>${x[0]??""}</td><td>${num(x[1])}</td><td>${num(x[2])}</td><td>${num(x[3])}</td>
        <td>${num(x[4])}</td><td>${num(x[5])}</td><td>${num(x[6])}</td><td>${pct(x[9])}</td><td>${x[11]??"-"}</td>
      </tr>`).join("");
    }
    function renderVideos(rows) {
      const el = document.getElementById("videoRows");
      const r = rows.filter(x=>x[2]); // 타이틀 있는 것만 (D열=index2)
      if (!r.length) { el.innerHTML='<tr><td colspan="9" class="empty">데이터 없음</td></tr>'; return; }
      // 컬럼: 0업로드일 1형태 2타이틀 3길이 4노출수 5CTR 6평균조회율 7조회수 8좋아요 9댓글 10공유 11구독전환
      el.innerHTML = r.map(x=>`<tr>
        <td>${x[0]??""}</td><td style="text-align:left;max-width:320px;overflow:hidden;text-overflow:ellipsis">${x[2]??""}</td>
        <td>${x[3]??""}</td><td>${pct(x[6])}</td><td>${num(x[7])}</td>
        <td>${num(x[8])}</td><td>${num(x[9])}</td><td>${num(x[10])}</td><td>${num(x[11])}</td>
      </tr>`).join("");
    }

    async function load() {
      const r = await fetch("/api/data").then(r=>r.json());
      if (r.ok) { renderDaily(r.daily||[]); renderVideos(r.videos||[]); }
    }
    async function sync() {
      const btn=document.getElementById("syncBtn"), st=document.getElementById("status");
      btn.disabled=true; st.textContent="동기화 중... (유튜브→시트, 10~30초 걸릴 수 있어요)";
      try {
        const r = await fetch("/api/sync",{method:"POST"}).then(r=>r.json());
        if (r.ok) { st.textContent=`✅ 완료: 일별 ${r.dailyRows}일, 영상 ${r.videoRows}개 기록 (${new Date().toLocaleString("ko-KR")})`; await load(); }
        else st.textContent="❌ 오류: "+r.error;
      } catch(e){ st.textContent="❌ 오류: "+e.message; }
      finally { btn.disabled=false; }
    }
    load();
  </script>
</body>
</html>
