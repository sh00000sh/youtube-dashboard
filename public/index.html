<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 인게이지먼트 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: #0f1117; color: #e6e8ee; padding: 32px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .sub { color: #8b90a0; font-size: 14px; margin-bottom: 24px; }
    .bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    button {
      background: #ff0033; color: #fff; border: 0; padding: 12px 20px;
      border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: wait; }
    .status { font-size: 13px; color: #8b90a0; }

    /* 채널 요약 카드 */
    .channel-name { font-size: 15px; color: #aab; margin-bottom: 10px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .card { background: #171a23; border: 1px solid #242838; border-radius: 12px; padding: 18px 20px; }
    .card .label { font-size: 12px; color: #8b90a0; margin-bottom: 8px; }
    .card .value { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }

    .section-title { font-size: 14px; color: #aab; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; background: #171a23; border-radius: 12px; overflow: hidden; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #242838; font-size: 14px; }
    th { background: #1e2231; color: #aab; font-size: 12px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: 0; }
    .title-cell { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { padding: 40px; text-align: center; color: #8b90a0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⚡ 유튜브 인게이지먼트 대시보드</h1>
    <div class="sub">동기화 버튼을 누르면 채널 통계와 영상별 인게이지먼트를 최신으로 가져옵니다.</div>

    <div class="bar">
      <button id="syncBtn" onclick="sync()">🔄 동기화</button>
      <span class="status" id="status">마지막 동기화: -</span>
    </div>

    <!-- 채널 요약 -->
    <div class="channel-name" id="channelName">채널: -</div>
    <div class="cards">
      <div class="card"><div class="label">구독자 수</div><div class="value" id="subs">-</div></div>
      <div class="card"><div class="label">채널 총 조회수</div><div class="value" id="totalViews">-</div></div>
      <div class="card"><div class="label">총 영상 수</div><div class="value" id="videoCount">-</div></div>
    </div>

    <!-- 영상별 -->
    <div class="section-title">영상별 인게이지먼트</div>
    <table>
      <thead>
        <tr>
          <th>영상 제목</th>
          <th class="num">조회수</th>
          <th class="num">좋아요</th>
          <th class="num">댓글</th>
          <th class="num">업데이트</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="5" class="empty">아직 데이터가 없어요. [🔄 동기화]를 눌러보세요.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const fmt = (n) => (n == null ? "-" : Number(n).toLocaleString("ko-KR"));
    const timeFmt = (t) => t ? new Date(t).toLocaleString("ko-KR") : "-";

    function render(data) {
      const c = data.channel;
      document.getElementById("channelName").textContent = "채널: " + (c?.title ?? "-");
      document.getElementById("subs").textContent = fmt(c?.subscribers);
      document.getElementById("totalViews").textContent = fmt(c?.total_views);
      document.getElementById("videoCount").textContent = fmt(c?.video_count);

      const rows = document.getElementById("rows");
      const videos = data.videos || [];
      if (videos.length === 0) {
        rows.innerHTML = '<tr><td colspan="5" class="empty">아직 영상 데이터가 없어요. VIDEO_IDS를 넣고 동기화하세요.</td></tr>';
        return;
      }
      rows.innerHTML = videos.map((v) => `
        <tr>
          <td class="title-cell">${v.title ?? v.video_id}</td>
          <td class="num">${fmt(v.views)}</td>
          <td class="num">${fmt(v.likes)}</td>
          <td class="num">${fmt(v.comments)}</td>
          <td class="num">${timeFmt(v.updated_at)}</td>
        </tr>`).join("");
    }

    async function load() {
      const r = await fetch("/api/data").then((r) => r.json());
      if (r.ok) render(r);
    }

    async function sync() {
      const btn = document.getElementById("syncBtn");
      const status = document.getElementById("status");
      btn.disabled = true;
      status.textContent = "동기화 중...";
      try {
        const r = await fetch("/api/sync", { method: "POST" }).then((r) => r.json());
        if (r.ok) {
          render(r);
          status.textContent = "마지막 동기화: " + new Date().toLocaleString("ko-KR") + ` (영상 ${r.videoCount}개)`;
        } else {
          status.textContent = "❌ 오류: " + r.error;
        }
      } catch (e) {
        status.textContent = "❌ 오류: " + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    load();
  </script>
</body>
</html>
