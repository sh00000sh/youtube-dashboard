    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <style>
      :root{
        --g1:#4b45d1; --g2:#6d6ef0; --g3:#9294f7; --angle:146deg;
        --font:'Noto Sans KR',sans-serif;
        --glass:rgba(255,255,255,.10);
        --glass-hi:rgba(255,255,255,.17);
        --stroke:rgba(255,255,255,.20);
        --w:#fff; --w70:rgba(255,255,255,.72); --w55:rgba(255,255,255,.55); --w40:rgba(255,255,255,.40);
      }
      *{margin:0;padding:0;box-sizing:border-box}
      body{
        font-family:var(--font); color:var(--w); min-height:100vh; -webkit-font-smoothing:antialiased;
        word-break:keep-all;
        background:
          radial-gradient(120% 90% at 82% 88%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 42%),
          linear-gradient(var(--angle), var(--g1) 0%, var(--g2) 52%, var(--g3) 100%);
        background-attachment:fixed;
      }
      .page{max-width:462px; margin:0 auto; padding:56px 22px 40px; opacity:0}
      .page.ready{opacity:1; transition:opacity .16s ease}

      /* 히어로 */
      .hero{text-align:center; opacity:0; animation:fadeDown .7s ease forwards}
      .emblem{position:relative; width:104px; height:104px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center}
      .emblem::before{content:""; position:absolute; inset:-18px; border-radius:50%;
        background:radial-gradient(closest-side, rgba(255,255,255,.38), rgba(255,255,255,0) 72%); filter:blur(2px)}
      .emblem svg, .emblem img{position:relative; width:104px; height:104px; object-fit:contain;
        filter:drop-shadow(0 10px 22px rgba(30,20,90,.35))}
      h1{font-size:26px; font-weight:800; letter-spacing:-.02em; text-wrap:balance}
      .sub{font-size:13.5px; color:var(--w70); margin-top:9px}
      .socials{display:inline-flex; gap:18px; margin-top:22px}
      .socials a{width:44px; height:44px; display:flex; align-items:center; justify-content:center;
        color:var(--w); text-decoration:none; opacity:.94; transition:transform .16s ease, opacity .16s ease}
      .socials a:hover{transform:translateY(-2px); opacity:1}
      .socials svg{width:27px; height:27px; filter:drop-shadow(0 2px 6px rgba(20,15,60,.28))}

      /* 링크 카드 */
      .list{display:flex; flex-direction:column; gap:12px; margin-top:30px}
      .card{display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--tcol,#fff);
        background:var(--cbg,rgba(255,255,255,.10)); border:1px solid var(--stroke); border-radius:18px; padding:13px 14px;
        backdrop-filter:blur(16px) saturate(140%); -webkit-backdrop-filter:blur(16px) saturate(140%);
        box-shadow:0 8px 22px rgba(35,25,95,.16);
        opacity:0; transform:translateY(16px); animation:rise .6s cubic-bezier(.22,.61,.36,1) forwards;
        transition:background .18s ease, transform .18s ease, box-shadow .18s ease, border-color .18s ease}
      .card:hover{transform:translateY(-3px); border-color:rgba(255,255,255,.34); box-shadow:0 14px 30px rgba(35,25,95,.24);
        background:var(--cbgh,rgba(255,255,255,.16))}
      /* 테두리만 : 채움·블러·그림자 제거하고 외곽선만 */
      .card.st-outline{background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none; box-shadow:none; border-color:rgba(255,255,255,.5)}
      .card.st-outline:hover{background:rgba(255,255,255,.07); box-shadow:none; border-color:rgba(255,255,255,.72)}
      /* 없음(투명) : 칸 자체를 없애고 아이콘+텍스트만 */
      .card.st-none{background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none; box-shadow:none; border-color:transparent}
      .card.st-none:hover{background:transparent; box-shadow:none; border-color:transparent}

      /* 메뉴 구분(테두리 없는 리스트용) */
      .list.sep-divider{gap:0}
      .list.sep-divider .card{border-radius:0; padding-top:15px; padding-bottom:15px}
      .list.sep-divider .card + .card{border-top:1px solid rgba(255,255,255,.15)}
      .list.sep-soft .card{background:rgba(255,255,255,.08)}
      .list.sep-soft .card:hover{background:rgba(255,255,255,.14)}
      .card:nth-child(1){animation-delay:.10s}.card:nth-child(2){animation-delay:.17s}
      .card:nth-child(3){animation-delay:.24s}.card:nth-child(4){animation-delay:.31s}
      .card:nth-child(5){animation-delay:.38s}.card:nth-child(6){animation-delay:.45s}
      .card:nth-child(7){animation-delay:.52s}

      .tile{flex-shrink:0; width:52px; height:52px; border-radius:14px; overflow:hidden;
        display:flex; align-items:center; justify-content:center;
        box-shadow:0 4px 12px rgba(20,15,60,.28), inset 0 1px 0 rgba(255,255,255,.35);
        transform:perspective(340px) rotateY(var(--ry,0deg)) rotateX(var(--rx,0deg));
        transition:transform .32s cubic-bezier(.2,.7,.2,1)}
      .card:hover .tile{transform:perspective(340px) rotateY(0deg) rotateX(0deg) scale(1.06)}
      .tile svg{width:25px; height:25px; color:#fff}
      .tile img{width:100%; height:100%; object-fit:cover}
      .tx{flex:1; min-width:0}
      .tx .desc{display:block; font-size:11.5px; color:var(--tcol,#fff); opacity:.62; margin-bottom:3px}
      .tx b{display:block; font-size:16px; font-weight:700; letter-spacing:-.01em; color:var(--tcol,#fff)}
      .go{flex-shrink:0; color:var(--tcol,#fff); opacity:.4; display:flex; transition:opacity .18s ease, transform .18s ease}
      .go svg{width:17px; height:17px}
      .card:hover .go{opacity:1; transform:translateX(3px)}

      .foot{text-align:center; padding:34px 8px 6px; opacity:0; animation:rise .6s ease .5s forwards}
      .foot p{font-size:10.5px; line-height:1.85; color:var(--w40); max-width:400px; margin:0 auto}

      @keyframes rise{to{opacity:1; transform:translateY(0)}}
      @keyframes fadeDown{from{opacity:0; transform:translateY(-10px)}to{opacity:1; transform:translateY(0)}}
      @media (prefers-reduced-motion:reduce){.hero,.card,.foot{animation:none; opacity:1; transform:none}}
    </style>
</head>

      <main class="list" id="list"></main>

        <p>투자 권유가 아닌 정보 제공용이며, 일부는 외부 사이트로 연결돼요.<br>정보는 지연·변경될 수 있어 투자 결과의 법적 증빙이 될 수 없어요.</p>

<script>
/* ===== 링크허브 : 설정 기반 렌더 (설정 API 실패 시 기본값 사용) ===== */
(function(){
  var FONTS = {
    noto:"'Noto Sans KR',sans-serif",
    pretendard:"'Pretendard Variable',Pretendard,sans-serif",
    nanum:"'Nanum Gothic',sans-serif",
    plex:"'IBM Plex Sans KR',sans-serif",
    gowun:"'Gowun Dodum',sans-serif",
    blackhan:"'Black Han Sans',sans-serif",
    dohyeon:"'Do Hyeon',sans-serif"
  };
  var ICONS = {
    chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-5 3 3 5-7"/></svg>',
    youtube:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12s0-3.2-.4-4.7a2.5 2.5 0 0 0-1.7-1.7C19.3 5.2 12 5.2 12 5.2s-7.3 0-8.9.4A2.5 2.5 0 0 0 1.4 7.3C1 8.8 1 12 1 12s0 3.2.4 4.7a2.5 2.5 0 0 0 1.7 1.7c1.6.4 8.9.4 8.9.4s7.3 0 8.9-.4a2.5 2.5 0 0 0 1.7-1.7C23 15.2 23 12 23 12ZM9.8 15.3V8.7l6 3.3-6 3.3Z"/></svg>',
    book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5V5.5Z"/><path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20v3H6.5A2.5 2.5 0 0 1 4 20.5Z"/></svg>',
    feather:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c-6 1-11 5-13 11l-1 5 5-1c6-2 10-7 11-13"/><path d="M6 20c1-3 3-5 6-6"/></svg>',
    grad:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 2 9l10 5 10-5-10-5Z"/><path d="M5 11v5c0 1.5 3.2 3 7 3s7-1.5 7-3v-5"/></svg>',
    link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>'
  };
  var CHEV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
  var KNOWN_DST=['sihwang','youtube','guide','blog','edu'];

  var DEFAULT = {
    bg:{c1:"#4b45d1",c2:"#6d6ef0",c3:"#9294f7",angle:146}, font:"noto",
    title:"유진투자선물", subtitle:"유진투자선물 공식 링크 허브", emblem:"",
    sepDivider:false, sepSoft:false,
    cards:[
      {id:"sihwang",title:"시황",desc:"데일리 옵션 마켓 시황",url:"https://eugeneoptions.pages.dev/?s=1",icon:"chart",tint:"#f59e0b",opacity:12,cardBg:"#ffffff",textColor:"#ffffff",cardStyle:"fill",imgOpacity:100,rotY:0,rotX:0,img:""},
      {id:"youtube",title:"유튜브",desc:"옵션 개념·전략 영상",url:"https://www.youtube.com/@유진투자선물_official",icon:"youtube",tint:"#ef4444",opacity:12,cardBg:"#ffffff",textColor:"#ffffff",cardStyle:"fill",imgOpacity:100,rotY:0,rotX:0,img:""},
      {id:"guide",title:"가이드북",desc:"미국주식옵션 입문",url:"https://options.eugenefutures.com/usoguide/index.html",icon:"book",tint:"#0ea5e9",opacity:12,cardBg:"#ffffff",textColor:"#ffffff",cardStyle:"fill",imgOpacity:100,rotY:0,rotX:0,img:""},
      {id:"blog",title:"블로그",desc:"옵션 기초 개념·용어",url:"https://blog.naver.com/eugenefutures",icon:"feather",tint:"#10b981",opacity:12,cardBg:"#ffffff",textColor:"#ffffff",cardStyle:"fill",imgOpacity:100,rotY:0,rotX:0,img:""},
      {id:"edu",title:"사전교육 · 모의거래",desc:"거래 전 필수 · 무료",url:"https://options.eugenefutures.com/wts/works/MK_0001",icon:"grad",tint:"#475569",opacity:12,cardBg:"#ffffff",textColor:"#ffffff",cardStyle:"fill",imgOpacity:100,rotY:0,rotX:0,img:""}
    ]
  };

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function hexRgb(h){ var m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h||'#ffffff'); if(!m) return '255,255,255'; return parseInt(m[1],16)+','+parseInt(m[2],16)+','+parseInt(m[3],16); }
  function shade(hex,f){ // 색을 f만큼 어둡게
    var m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex||"#6366f1"); if(!m) return hex;
    var r=parseInt(m[1],16),g=parseInt(m[2],16),b=parseInt(m[3],16);
    r=Math.round(r*(1-f)); g=Math.round(g*(1-f)); b=Math.round(b*(1-f));
    return 'rgb('+r+','+g+','+b+')';
  }

  function apply(cfg){
    var bg=cfg.bg||DEFAULT.bg, r=document.documentElement.style;
    r.setProperty('--g1',bg.c1||'#4b45d1'); r.setProperty('--g2',bg.c2||'#6d6ef0');
    r.setProperty('--g3',bg.c3||'#9294f7'); r.setProperty('--angle',(bg.angle==null?146:bg.angle)+'deg');
    r.setProperty('--font',FONTS[cfg.font]||FONTS.noto);

    document.getElementById('hTitle').textContent=cfg.title||'';
    document.getElementById('hSub').textContent=cfg.subtitle||'';

    var em=document.getElementById('emblem');
    if(cfg.emblem){ em.innerHTML='<img src="'+esc(cfg.emblem)+'" alt="엠블럼" onerror="this.remove()">'; }
    else { em.innerHTML='<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="38" stroke="#fff" stroke-width="4"/><ellipse cx="50" cy="50" rx="16" ry="38" stroke="#fff" stroke-width="3.4"/><line x1="12" y1="50" x2="88" y2="50" stroke="#fff" stroke-width="3.4"/><path d="M19 31h62M19 69h62" stroke="#fff" stroke-width="3" opacity=".85"/></svg>'; }

    var list=document.getElementById('list');
    list.className='list'+(cfg.sepDivider?' sep-divider':'')+(cfg.sepSoft?' sep-soft':'');
    list.innerHTML=(cfg.cards||[]).map(function(c){
      var op=(Number(c.opacity)||0)/100;
      var iop=(c.imgOpacity==null?100:Number(c.imgOpacity))/100;
      var ry=(Number(c.rotY)||0), rx=(Number(c.rotX)||0);
      var trot='--ry:'+ry+'deg;--rx:'+rx+'deg';
      var rgb=hexRgb(c.cardBg||'#ffffff');
      var tcol=esc(c.textColor||'#ffffff');
      var style='--cbg:rgba('+rgb+','+op+');--cbgh:rgba('+rgb+','+Math.min(1,op+0.06)+');--tcol:'+tcol;
      var tile = c.img
        ? '<span class="tile" style="'+trot+'"><img src="'+esc(c.img)+'" alt="" style="opacity:'+iop+'"></span>'
        : '<span class="tile" style="background:linear-gradient(140deg,'+esc(c.tint||'#6366f1')+','+shade(c.tint||'#6366f1',.28)+');'+trot+'">'+(ICONS[c.icon]||ICONS.link)+'</span>';
      var dst=KNOWN_DST.indexOf(c.id)>=0?c.id:'etc';
      var scls=c.cardStyle==='outline'?' st-outline':(c.cardStyle==='none'?' st-none':'');
      return '<a class="card'+scls+'" style="'+style+'" href="'+esc(c.url)+'" target="_blank" rel="noopener" data-dst="'+dst+'">'
        +tile+'<span class="tx"><span class="desc">'+esc(c.desc)+'</span><b>'+esc(c.title)+'</b></span>'
        +'<span class="go">'+CHEV+'</span></a>';
    }).join('');
    bindTracking();
  }

  /* ===== 유입/클릭 추적 ===== */
  var trackBase='';
  (function initTrack(){
    try{
      var known=['youtube','instagram','plus','blog','chatmenu','chatbtn','etc'];
      var src=(new URLSearchParams(location.search).get('src')||'').toLowerCase();
      if(known.indexOf(src)<0){
        var ref=(document.referrer||'').toLowerCase();
        if(/youtube\.com|youtu\.be/.test(ref)) src='youtube';
        else if(/instagram\.com/.test(ref)) src='instagram';
        else if(/naver\.com/.test(ref)) src='blog';
        else if(/kakao/.test(ref)) src='plus';
        else src='etc';
      }
      var vid="";
      try{ vid=localStorage.getItem('ef_vid'); if(!vid){ vid=Date.now().toString(36)+Math.random().toString(36).slice(2,10); localStorage.setItem('ef_vid',vid); } }catch(e){}
      trackBase='/api/track?src='+encodeURIComponent(src)+'&vid='+encodeURIComponent(vid);
      fetch(trackBase,{keepalive:true}).catch(function(){});
    }catch(e){}
  })();
  function bindTracking(){
    if(!trackBase) return;
    document.querySelectorAll('.card').forEach(function(a){
      a.addEventListener('click',function(){
        try{ fetch(trackBase+'&dst='+encodeURIComponent(a.getAttribute('data-dst')||'etc'),{keepalive:true}).catch(function(){}); }catch(e){}
      });
    });
  }

  // 렌더는 설정 확정 후 딱 한 번(기본값 먼저 그렸다 덮어쓰는 깜빡임 방지). 그전까지 .page는 숨김.
  var page=document.querySelector('.page');
  function reveal(){ if(page) page.classList.add('ready'); }
  var painted=false;
  function renderOnce(cfg){ if(painted) return; painted=true; apply(cfg); reveal(); }

  if(new URLSearchParams(location.search).get('preview')){
    // 미리보기 모드: 부모창(관리자 수정탭)이 postMessage로 넘긴 설정을 실시간 적용
    apply(DEFAULT); reveal();
    window.addEventListener('message',function(e){
      if(e.data&&e.data.type==='hubcfg'&&e.data.config) apply(e.data.config);
    });
  } else {
    var to=setTimeout(function(){ renderOnce(DEFAULT); }, 2500);  // 응답 지연 시 폴백
    // head에서 미리 시작한 요청(window.__hubP) 재사용 → 더 빨리 확정
    var p = window.__hubP || fetch('/api/hub-config').then(function(r){return r.json();}).catch(function(){return null;});
    p.then(function(j){ clearTimeout(to); renderOnce(j&&j.ok&&j.config ? j.config : DEFAULT); })
     .catch(function(){ clearTimeout(to); renderOnce(DEFAULT); });
  }
})();
</script>
</body>
</html>
